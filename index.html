<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>專案開發儀表板</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="brand">DevBoard</div>
        <nav class="nav-menu" aria-label="主要導覽">
          <a class="nav-item active" href="#">專案</a>
          <a class="nav-item" href="#">任務</a>
          <a class="nav-item" href="#">設定</a>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <label class="search-wrap" for="search">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input
              id="search"
              type="search"
              placeholder="搜尋專案、任務或檔案..."
              aria-label="搜尋"
            />
          </label>
        </header>

        <section class="content" aria-label="開發工作區">
          <h1>開發工作區</h1>
          <p>在這裡集中管理專案進度、追蹤任務狀態，並快速切換設定。</p>
          <div class="cards">
            <article class="card">
              <h2>目前專案</h2>
              <p>3 個進行中</p>
            </article>
            <article class="card">
              <h2>待辦任務</h2>
              <p>12 項待處理</p>
            </article>
            <article class="card">
              <h2>系統狀態</h2>
              <p>所有服務正常</p>
            </article>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
