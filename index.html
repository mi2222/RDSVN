<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>開發儀表板 + 藍色小球遊戲</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-soft: #1f2430;
        --text: #eef2ff;
        --text-muted: #9aa3b2;
        --primary: #6f8dff;
        --primary-soft: rgba(111, 141, 255, 0.16);
        --border: #2b3342;
        --danger: #ff6a6a;
        --success: #4dd88f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Noto Sans TC", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 10%, #1a1f2b 0%, var(--bg) 42%);
        color: var(--text);
      }

      .app-layout {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        background: linear-gradient(180deg, #12161d 0%, #0f1218 100%);
        border-right: 1px solid var(--border);
        padding: 24px 18px;
      }

      .brand {
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        margin-bottom: 28px;
      }

      .nav-menu {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .nav-btn {
        color: var(--text-muted);
        text-align: left;
        border: 1px solid transparent;
        background: transparent;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.96rem;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .nav-btn:hover,
      .nav-btn:focus-visible {
        color: var(--text);
        background: #212836;
        outline: none;
      }

      .nav-btn.active {
        color: var(--text);
        background: var(--primary-soft);
        border: 1px solid rgba(111, 141, 255, 0.35);
      }

      .workspace {
        display: flex;
        flex-direction: column;
      }

      .topbar {
        padding: 22px 28px;
        border-bottom: 1px solid var(--border);
        background: rgba(10, 12, 16, 0.65);
        backdrop-filter: blur(5px);
      }

      .search-wrap {
        display: flex;
        align-items: center;
        max-width: 560px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        gap: 10px;
      }

      .search-wrap input {
        width: 100%;
        border: none;
        background: transparent;
        color: var(--text);
        font-size: 0.95rem;
      }

      .search-wrap input:focus {
        outline: none;
      }

      .content {
        padding: 28px;
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      .panel h1 {
        margin: 0 0 10px;
        font-size: 1.65rem;
      }

      .panel .desc {
        margin: 0;
        color: var(--text-muted);
      }

      .cards {
        margin-top: 24px;
        display: grid;
        grid-template-columns: repeat(3, minmax(170px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--panel-soft);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .card p {
        margin: 0;
        color: #b8c0cf;
      }

      .game-wrap {
        margin-top: 24px;
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 16px;
      }

      .game-board {
        background: #111521;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
      }

      canvas {
        width: 100%;
        height: auto;
        border-radius: 10px;
        border: 1px solid #2e3750;
        background: linear-gradient(180deg, #0a0f1b 0%, #101a2d 100%);
      }

      .game-info {
        display: grid;
        gap: 12px;
      }

      .stat {
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel-soft);
      }

      .stat .label {
        display: block;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .stat .value {
        margin-top: 6px;
        font-size: 1.35rem;
        font-weight: 700;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .controls button {
        border: 1px solid var(--border);
        background: #1d2640;
        color: var(--text);
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
      }

      .controls button:hover {
        background: #253258;
      }

      .tips {
        margin-top: 4px;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .lead-tools {
        margin-top: 22px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .lead-tools input {
        flex: 1 1 300px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        color: var(--text);
        padding: 10px 12px;
        font-size: 0.95rem;
      }

      .lead-tools input:focus {
        outline: 1px solid rgba(111, 141, 255, 0.5);
      }

      .btn-primary,
      .btn-secondary {
        border: 1px solid transparent;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.92rem;
      }

      .btn-primary {
        background: #2f4fd6;
        border-color: rgba(111, 141, 255, 0.35);
      }

      .btn-primary:hover {
        background: #3e61ef;
      }

      .btn-secondary {
        background: #1f2a44;
        border-color: var(--border);
      }

      .btn-secondary:hover {
        background: #29395f;
      }

      .table-wrap {
        margin-top: 16px;
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel-soft);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        font-size: 0.92rem;
      }

      th {
        background: #1b2231;
        color: #ced7ea;
        font-weight: 600;
      }

      td a {
        color: #9fc2ff;
      }

      .lead-meta {
        margin-top: 10px;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .verified-mail {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .mail-verified-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.78rem;
        color: #9df5bf;
        background: rgba(77, 216, 143, 0.18);
        border: 1px solid rgba(77, 216, 143, 0.45);
        border-radius: 999px;
        padding: 1px 7px;
        white-space: nowrap;
      }

      .empty-row {
        text-align: center;
        color: var(--text-muted);
      }

      .status {
        font-weight: 700;
      }

      .status.win {
        color: var(--success);
      }

      .status.lose {
        color: var(--danger);
      }

      @media (max-width: 980px) {
        .app-layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .nav-menu {
          flex-direction: row;
          flex-wrap: wrap;
        }

        .cards,
        .game-wrap {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="brand">DevBoard</div>
        <nav class="nav-menu" aria-label="主要導覽">
          <button class="nav-btn active" data-panel="dashboard">儀表板</button>
          <button class="nav-btn" data-panel="game">藍色小球遊戲</button>
          <button class="nav-btn" data-panel="lead-generator">客群精準開發 (Lead Generator)</button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <label class="search-wrap" for="search">
            <span aria-hidden="true">⌕</span>
            <input
              id="search"
              type="search"
              placeholder="搜尋專案、任務或指令..."
              aria-label="搜尋"
            />
          </label>
        </header>

        <section class="content" aria-label="內容區">
          <section id="dashboard" class="panel active" aria-label="開發儀表板">
            <h1>開發儀表板</h1>
            <p class="desc">即時掌握專案狀態、任務進度與系統健康度。</p>
            <div class="cards">
              <article class="card">
                <h2>目前專案</h2>
                <p>3 個進行中</p>
              </article>
              <article class="card">
                <h2>待辦任務</h2>
                <p>12 項待處理</p>
              </article>
              <article class="card">
                <h2>系統狀態</h2>
                <p>所有服務正常</p>
              </article>
            </div>
          </section>

          <section id="game" class="panel" aria-label="藍色小球遊戲">
            <h1>藍色小球遊戲</h1>
            <p class="desc">用方向鍵或 WASD 控制藍色小球，閃開紅色障礙並吃到金色目標。</p>

            <div class="game-wrap">
              <div class="game-board">
                <canvas id="gameCanvas" width="760" height="420" aria-label="遊戲畫布"></canvas>
              </div>

              <aside class="game-info">
                <div class="stat">
                  <span class="label">分數</span>
                  <div id="score" class="value">0</div>
                </div>
                <div class="stat">
                  <span class="label">剩餘時間</span>
                  <div id="time" class="value">60</div>
                </div>
                <div class="stat">
                  <span class="label">狀態</span>
                  <div id="status" class="value status">準備開始</div>
                </div>
                <div class="controls">
                  <button id="startBtn" type="button">開始</button>
                  <button id="resetBtn" type="button">重置</button>
                </div>
                <p class="tips">每吃到一個金色目標 +10 分；撞到障礙物會 -5 分並反彈。</p>
              </aside>
            </div>
          </section>

          <section id="lead-generator" class="panel" aria-label="客群精準開發">
            <h1>客群精準開發 (Lead Generator)</h1>
            <p class="desc">輸入產品名稱並模擬搜尋具備有效聯絡信箱的潛在客群名單。</p>

            <div class="lead-tools">
              <input
                id="leadKeyword"
                type="text"
                placeholder="請輸入產品名稱（例如：滾珠開關）"
                aria-label="產品名稱"
              />
              <button id="leadSearchBtn" class="btn-primary" type="button">開始搜尋</button>
              <button id="exportCsvBtn" class="btn-secondary" type="button" disabled>匯出 CSV</button>
            </div>

            <p id="leadMeta" class="lead-meta">尚未搜尋。</p>

            <div class="table-wrap">
              <table aria-label="潛在客群結果表">
                <thead>
                  <tr>
                    <th>廠商名稱</th>
                    <th>產業類別</th>
                    <th>應用場景</th>
                    <th>官方網站</th>
                    <th>聯絡 Mail</th>
                  </tr>
                </thead>
                <tbody id="leadTableBody">
                  <tr>
                    <td class="empty-row" colspan="5">請輸入產品名稱後點擊「開始搜尋」。</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script>
      const navButtons = document.querySelectorAll('.nav-btn');
      const panels = document.querySelectorAll('.panel');

      navButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          navButtons.forEach((b) => b.classList.remove('active'));
          panels.forEach((panel) => panel.classList.remove('active'));

          btn.classList.add('active');
          const target = document.getElementById(btn.dataset.panel);
          if (target) target.classList.add('active');
        });
      });

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const timeEl = document.getElementById('time');
      const statusEl = document.getElementById('status');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const leadKeywordInput = document.getElementById('leadKeyword');
      const leadSearchBtn = document.getElementById('leadSearchBtn');
      const exportCsvBtn = document.getElementById('exportCsvBtn');
      const leadTableBody = document.getElementById('leadTableBody');
      const leadMeta = document.getElementById('leadMeta');

      const INDUSTRY_DATABASE = {
        '工業感測器與自動化': {
          keywords: ['感測器', 'sensor', '壓力', '溫度', '接近', 'proximity', '自動化', '工控', 'plc'],
          leads: [
            {
              companyName: 'Omron Industrial Automation',
              industryCategory: '工業感測器與自動化',
              application: '光電與接近感測器、工業自動化控制',
              website: 'https://www.ia.omron.com',
              email: 'info@omron.com',
            },
            {
              companyName: 'SICK Sensor Intelligence',
              industryCategory: '工業感測器與自動化',
              application: '雷射位移、編碼器與機器視覺感測系統',
              website: 'https://www.sick.com',
              email: 'sales@sick.com',
            },
            {
              companyName: 'Honeywell Sensing Solutions',
              industryCategory: '工業感測器與自動化',
              application: '壓力、溫度與流量感測元件',
              website: 'https://sps.honeywell.com',
              email: 'contact@honeywell.com',
            },
          ],
        },
        '開關與人機介面元件': {
          keywords: ['開關', 'switch', '按鍵', '微動', 'toggle', '按鈕', 'hmi', 'keyboard'],
          leads: [
            {
              companyName: 'ALPS ALPINE',
              industryCategory: '開關與人機介面元件',
              application: '檢知開關、觸控與人機輸入元件',
              website: 'https://www.alpsalpine.com',
              email: 'support@alpsalpine.com',
            },
            {
              companyName: 'C&K Switches (Littelfuse)',
              industryCategory: '開關與人機介面元件',
              application: '微動、滑動、搖頭與按鍵開關',
              website: 'https://www.ckswitches.com',
              email: 'sales@ckswitches.com',
            },
            {
              companyName: 'Schneider Electric',
              industryCategory: '開關與人機介面元件',
              application: '工業控制開關與控制面板元件',
              website: 'https://www.se.com',
              email: 'contact@se.com',
            },
          ],
        },
        '電子零件與被動元件': {
          keywords: ['電子零件', '元件', '被動元件', '電阻', '電容', 'inductor', 'connector', '半導體'],
          leads: [
            {
              companyName: 'Murata Manufacturing',
              industryCategory: '電子零件與被動元件',
              application: 'MLCC、多層電感與 RF 被動元件',
              website: 'https://www.murata.com',
              email: 'marketing@murata.com',
            },
            {
              companyName: 'TDK Corporation',
              industryCategory: '電子零件與被動元件',
              application: '磁性元件、感測器與電源解決方案',
              website: 'https://www.tdk.com',
              email: 'contact@tdk.com',
            },
            {
              companyName: 'TE Connectivity',
              industryCategory: '電子零件與被動元件',
              application: '連接器、繼電器與工業電子模組',
              website: 'https://www.te.com',
              email: 'support@te.com',
            },
            {
              companyName: 'Vishay Intertechnology',
              industryCategory: '電子零件與被動元件',
              application: '二極體、MOSFET、電阻與光電元件',
              website: 'https://www.vishay.com',
              email: 'info@vishay.com',
            },
          ],
        },
      };

      let currentLeadResults = [];

      const player = {
        x: 90,
        y: 210,
        radius: 16,
        speed: 4,
        color: '#3b82f6',
      };

      const target = { x: 650, y: 80, radius: 12, color: '#ffd166' };

      const obstacles = [
        { x: 190, y: 70, w: 20, h: 290 },
        { x: 340, y: 20, w: 20, h: 230 },
        { x: 500, y: 150, w: 20, h: 250 },
        { x: 610, y: 0, w: 20, h: 210 },
      ];

      const keys = new Set();
      let score = 0;
      let timeLeft = 60;
      let running = false;
      let timer = null;
      let anim = null;

      function randomizeTarget() {
        const margin = 30;
        let valid = false;

        while (!valid) {
          target.x = Math.floor(Math.random() * (canvas.width - margin * 2)) + margin;
          target.y = Math.floor(Math.random() * (canvas.height - margin * 2)) + margin;

          valid = !obstacles.some(
            (ob) =>
              target.x > ob.x - target.radius &&
              target.x < ob.x + ob.w + target.radius &&
              target.y > ob.y - target.radius &&
              target.y < ob.y + ob.h + target.radius
          );
        }
      }

      function setStatus(text, type = '') {
        statusEl.textContent = text;
        statusEl.className = `value status ${type}`.trim();
      }

      function resetPlayer() {
        player.x = 90;
        player.y = 210;
      }

      function drawCircle(x, y, radius, color) {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }

      function drawObstacles() {
        ctx.fillStyle = '#ff6a6a';
        obstacles.forEach((ob) => ctx.fillRect(ob.x, ob.y, ob.w, ob.h));
      }

      function circleRectCollision(circle, rect) {
        const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
        const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
        const dx = circle.x - closestX;
        const dy = circle.y - closestY;
        return dx * dx + dy * dy < circle.radius * circle.radius;
      }

      function update() {
        if (!running) return;

        if (keys.has('arrowup') || keys.has('w')) player.y -= player.speed;
        if (keys.has('arrowdown') || keys.has('s')) player.y += player.speed;
        if (keys.has('arrowleft') || keys.has('a')) player.x -= player.speed;
        if (keys.has('arrowright') || keys.has('d')) player.x += player.speed;

        player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
        player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

        const hitObstacle = obstacles.some((ob) => circleRectCollision(player, ob));
        if (hitObstacle) {
          score = Math.max(0, score - 5);
          scoreEl.textContent = score;
          resetPlayer();
        }

        const dx = player.x - target.x;
        const dy = player.y - target.y;
        const distance = Math.hypot(dx, dy);

        if (distance < player.radius + target.radius) {
          score += 10;
          scoreEl.textContent = score;
          randomizeTarget();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawObstacles();
        drawCircle(target.x, target.y, target.radius, target.color);
        drawCircle(player.x, player.y, player.radius, player.color);
      }

      function gameLoop() {
        update();
        draw();
        anim = requestAnimationFrame(gameLoop);
      }

      function stopGame(message, type = '') {
        running = false;
        clearInterval(timer);
        timer = null;
        cancelAnimationFrame(anim);
        anim = null;
        setStatus(message, type);
      }

      function startGame() {
        if (running) return;
        if (timeLeft <= 0) {
          timeLeft = 60;
          score = 0;
          scoreEl.textContent = score;
          timeEl.textContent = timeLeft;
        }

        running = true;
        setStatus('遊戲中');
        timer = setInterval(() => {
          timeLeft -= 1;
          timeEl.textContent = timeLeft;

          if (timeLeft <= 0) {
            stopGame(score >= 80 ? '過關成功！' : '時間到，繼續挑戰！', score >= 80 ? 'win' : 'lose');
          }
        }, 1000);

        gameLoop();
      }

      function resetGame() {
        stopGame('準備開始');
        score = 0;
        timeLeft = 60;
        scoreEl.textContent = score;
        timeEl.textContent = timeLeft;
        resetPlayer();
        randomizeTarget();
        draw();
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function escapeCSV(value) {
        const safe = String(value ?? '').replace(/"/g, '""');
        return `"${safe}"`;
      }

      function buildLeadRows(rows) {
        if (!rows.length) {
          leadTableBody.innerHTML = `
            <tr>
              <td class="empty-row" colspan="5">沒有符合條件（含有效電子郵件）的客群資料。</td>
            </tr>
          `;
          return;
        }

        leadTableBody.innerHTML = rows
          .map(
            (item) => `
            <tr>
              <td>${item.companyName}</td>
              <td>${item.industryCategory}</td>
              <td>${item.application}</td>
              <td><a href="${item.website}" target="_blank" rel="noopener noreferrer">${item.website}</a></td>
              <td>
                <span class="verified-mail">
                  ${item.email}
                  <span class="mail-verified-badge" aria-label="已驗證有效">✅ 已驗證有效</span>
                </span>
              </td>
            </tr>
          `
          )
          .join('');
      }

      function normalizeText(value) {
        return value.trim().toLowerCase();
      }

      function matchIndustryCategories(keyword) {
        const normalized = normalizeText(keyword);
        return Object.entries(INDUSTRY_DATABASE)
          .filter(([, config]) => config.keywords.some((term) => normalized.includes(term.toLowerCase())))
          .map(([category]) => category);
      }

      async function fetchLeadsFromAPI(keyword, matchedCategories = []) {
        const apiConfig = {
          provider: 'local-mock', // 未來可改成: google-search / hunter-io
          googleApiKey: '', // TODO: 填入 Google Search API Key
          googleCseId: '', // TODO: 填入 Google CSE ID
          hunterApiKey: '', // TODO: 填入 Hunter.io API Key
        };

        // 預留對外 API 串接流程：
        // 1) 依 apiConfig.provider 選擇 Google Search API / Hunter.io API
        // 2) 傳入 keyword + matchedCategories 作為 query
        // 3) 將結果正規化成 { companyName, industryCategory, application, website, email }
        // 目前以本機資料庫模擬回傳
        const simulatedRows = Object.values(INDUSTRY_DATABASE).flatMap((group) => group.leads);

        if (apiConfig.provider === 'local-mock') {
          return Promise.resolve(simulatedRows);
        }

        return Promise.resolve([]);
      }

      async function simulateLeadSearch(keyword) {
        const normalized = normalizeText(keyword);
        const matchedCategories = matchIndustryCategories(normalized);
        const apiRows = await fetchLeadsFromAPI(normalized, matchedCategories);

        const scopedRows = matchedCategories.length
          ? apiRows.filter((lead) => matchedCategories.includes(lead.industryCategory))
          : apiRows;

        const scored = scopedRows.map((lead) => {
          const haystack = `${lead.companyName} ${lead.application} ${lead.industryCategory}`.toLowerCase();
          const score =
            (haystack.includes(normalized) ? 3 : 0) +
            matchedCategories.filter((category) => lead.industryCategory === category).length * 2;
          return { ...lead, score };
        });

        return scored
          .filter((lead) => isValidEmail(lead.email))
          .sort((a, b) => b.score - a.score)
          .slice(0, 8);
      }

      async function onLeadSearch() {
        const keyword = leadKeywordInput.value.trim();
        if (!keyword) {
          leadMeta.textContent = '請先輸入產品名稱後再搜尋。';
          currentLeadResults = [];
          exportCsvBtn.disabled = true;
          buildLeadRows([]);
          return;
        }

        const matchedCategories = matchIndustryCategories(keyword);
        currentLeadResults = await simulateLeadSearch(keyword);
        buildLeadRows(currentLeadResults);
        exportCsvBtn.disabled = currentLeadResults.length === 0;
        leadMeta.textContent = `關鍵字「${keyword}」搜尋完成，共 ${currentLeadResults.length} 筆（類別：${
          matchedCategories.length ? matchedCategories.join('、') : '未指定，已啟用全庫模糊比對'
        }）。`;
      }

      function onExportCSV() {
        if (!currentLeadResults.length) return;
        const header = ['廠商名稱', '產業類別', '應用場景', '官方網站', '聯絡 Mail'];
        const rows = currentLeadResults.map((item) => [
          item.companyName,
          item.industryCategory,
          item.application,
          item.website,
          item.email,
        ]);
        const csv = [header, ...rows].map((row) => row.map(escapeCSV).join(',')).join('\n');
        const blob = new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'lead-generator-results.csv';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      window.addEventListener('keydown', (event) => {
        keys.add(event.key.toLowerCase());
      });

      window.addEventListener('keyup', (event) => {
        keys.delete(event.key.toLowerCase());
      });

      startBtn.addEventListener('click', startGame);
      resetBtn.addEventListener('click', resetGame);
      leadSearchBtn.addEventListener('click', onLeadSearch);
      exportCsvBtn.addEventListener('click', onExportCSV);
      leadKeywordInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') onLeadSearch();
      });

      draw();
    </script>
  </body>
</html>
